<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment - Blue Fox Summit</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        
        <div class="mobile-header">
            <div class="hamburger" id="hamburger-menu"><i class="fa-solid fa-bars"></i></div>
            <h2>BLUE FOX SUMMIT</h2>
            <div class="mobile-profile"><img src="https://ui-avatars.com/api/?name=User&background=random&rounded=true" alt="Profile" class="profile-img"></div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <h2>BLUE FOX SUMMIT<br>INSURANCE AGENCY</h2>
                </div>
                <div class="close-sidebar" id="close-sidebar"><i class="fa-solid fa-xmark"></i></div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                    <li><a href="appointments.html"><i class="fa-regular fa-calendar-check"></i> Appointments</a></li>
                    <li><a href="clients.html"><i class="fa-solid fa-user-group"></i> Clients</a></li>
                    <li class="active"><a href="recruitment.html"><i class="fa-solid fa-magnifying-glass-chart"></i> Recruitment</a></li>
                    <li><a href="schedule.html"><i class="fa-regular fa-clock"></i> Schedule</a></li>
                    <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=random&rounded=true" alt="Profile Picture" class="profile-img" id="sidebar-avatar">
                    <div class="user-info">
                        <span class="user-name" id="sidebar-user-name">Loading...</span>
                        <span class="user-badge" id="sidebar-user-role"><i class="fa-solid fa-award"></i> Agent</span>
                    </div>
                </div>
                <a href="#" id="logout-btn" class="sidebar-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <header class="top-header">
                <div class="welcome-section">
                    <h1 class="page-title">Recruitment Management</h1>
                </div>
                <div class="header-actions">
                    <div class="notification-icon desktop-only">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge" style="background-color: #35c1ff;">1</span>
                    </div>
                </div>
            </header>

            <section class="recruitment-toolbar">
                <div class="search-bar recruit-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="recruit-search" placeholder="Search recruits here">
                </div>
                
                <div class="toolbar-actions">
                    <select id="recruit-status-filter" class="custom-select">
                        <option value="all">All Status</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="hired">Hired</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    
                    <button class="action-btn btn-navy-solid" style="margin-bottom: 0; width: auto; padding: 10px 20px;">
                        Add New Recruit
                    </button>
                </div>
            </section>

            <section class="recruits-grid" id="recruits-container">
                <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #8a8a8a;">
                    Loading recruits...
                </div>
            </section>
        </main>
    </div>

    <script>
        const hamburgerMenu = document.getElementById('hamburger-menu');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }
        hamburgerMenu.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
    </script>

    <script src="js/recruitment.js"></script>
</body>
</html>
