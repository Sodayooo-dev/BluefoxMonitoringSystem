<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Blue Fox Summit</title>
    <link rel="stylesheet" href="styles/style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        
        <div class="mobile-header">
            <div class="hamburger" id="hamburger-menu"><i class="fa-solid fa-bars"></i></div>
            <h2>BLUE FOX SUMMIT</h2>
            <div class="mobile-profile"><img src="https://ui-avatars.com/api/?name=User&background=random&rounded=true" alt="Profile" class="profile-img"></div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <h2>BLUE FOX SUMMIT<br>INSURANCE AGENCY</h2>
                </div>
                <div class="close-sidebar" id="close-sidebar"><i class="fa-solid fa-xmark"></i></div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
                    <li><a href="appointments.html"><i class="fa-regular fa-calendar-check"></i> Appointments</a></li>
                    <li><a href="clients.html"><i class="fa-solid fa-user-group"></i> Clients</a></li>
                    <li><a href="recruitment.html"><i class="fa-solid fa-magnifying-glass-chart"></i> Recruitment</a></li>
                    <li class="active"><a href="schedule.html"><i class="fa-regular fa-clock"></i> Schedule</a></li>
                    <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=random&rounded=true" alt="Profile Picture" class="profile-img" id="sidebar-avatar">
                    <div class="user-info">
                        <span class="user-name" id="sidebar-user-name">Loading...</span>
                        <span class="user-badge" id="sidebar-user-role"><i class="fa-solid fa-award"></i> Agent</span>
                    </div>
                </div>
                <a href="#" id="logout-btn" class="sidebar-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content schedule-page">
            <div class="schedule-header-wrapper">
                <header class="top-header">
                    <div class="welcome-section">
                        <h1 class="page-title text-white">Scheduling</h1>
                    </div>
                    <div class="header-actions">
                        <div class="search-bar white-search">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="Search here">
                        </div>
                        <div class="notification-icon desktop-only">
                            <i class="fa-solid fa-bell text-white"></i>
                            <span class="badge" style="background-color: #35c1ff;">1</span>
                        </div>
                    </div>
                </header>
            </div>

            <div class="schedule-body">
                <div class="schedule-toolbar">
                    <h2 class="schedule-headline">Here is your <span class="text-blue">Schedule !</span></h2>
                    <button id="open-add-schedule-btn" class="action-btn btn-navy-solid" style="width: auto; margin: 0; padding: 12px 24px;">
                        <i class="fa-solid fa-plus"></i> Add Schedule
                    </button>
                </div>

                <div class="schedule-tabs">
                    <button class="tab-btn active">Weekly <span class="text-blue">Sched</span></button>
                    <button class="tab-btn">Monthly Sched</button>
                </div>

                <div class="calendar-wrapper">
            <div class="calendar-nav">
                <button class="nav-arrow" id="prev-week"><i class="fa-solid fa-arrow-left"></i></button>
                <h3 class="current-date-range" id="date-range-display">Week of June 1, 2026 to June 7, 2026</h3>
                <button class="nav-arrow" id="next-week"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="calendar-grid" id="weekly-grid"></div>
        </div>
    </div>
</main>
</div> <div class="modal-overlay" id="add-schedule-modal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title">
                <i class="fa-regular fa-file-lines"></i> Add Schedule
            </div>
            <button class="close-modal-btn" id="close-modal-x"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="add-schedule-form">
                <div class="form-group">
                    <label>Name of Activity</label>
                    <input type="text" id="activity-name" required>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="activity-date" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="activity-notes" rows="4"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn-close-modal" id="close-modal-btn">CLOSE</button>
            <button type="submit" form="add-schedule-form" class="btn-save-modal">SAVE</button>
        </div>
    </div>
</div>

<script>
    const hamburgerMenu = document.getElementById('hamburger-menu');
    const closeSidebarBtn = document.getElementById('close-sidebar');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
    }
    hamburgerMenu.addEventListener('click', toggleSidebar);
    closeSidebarBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);
</script>

<script src="js/schedule.js"></script>
</body>
</html>
