<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Bluefox Monitoring System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/style.css">
    
    <link rel="stylesheet" href="settingsStyle.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <img src="assets/images/logo-white.png" alt="Bluefox Logo" style="width: 150px;">
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="appointments.html">Appointments</a></li>
            <li><a href="recruitment.html">Recruitment</a></li>
            <li><a href="settings.html" class="active">Settings</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="page-header">
            <h1>Settings</h1>
            <p>Manage your account and preferences.</p>
        </header>

        <div class="settings-container">
            
            <section class="settings-card">
                <div class="card-header">
                    <h2>Preferences</h2>
                    <p>Customize your dashboard</p>
                </div>
                
                <div class="settings-row">
                    <div class="setting-info">
                        <label>Theme</label>
                    </div>
                    <div class="setting-action">
                        <select class="form-select">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                </div>

                <div class="settings-row">
                    <div class="setting-info">
                        <label>Date Format</label>
                    </div>
                    <div class="setting-action">
                        <select class="form-select">
                            <option value="mm/dd/yyyy">MM/DD/YYYY</option>
                            <option value="dd/mm/yyyy">DD/MM/YYYY</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="settings-card">
                <div class="card-header">
                    <h2>Data & Privacy</h2>
                </div>
                
                <div class="settings-row">
                    <div class="setting-info">
                        <label>Download My Data</label>
                        <span>Download a copy of your data</span>
                    </div>
                    <div class="setting-action">
                        <button class="btn btn-primary">Download</button>
                    </div>
                </div>
            </section>

            <section class="settings-card danger-zone">
                <div class="card-header">
                    <h2>Account Management</h2>
                </div>
                
                <div class="settings-row">
                    <div class="setting-info">
                        <label>Deactivate My Account</label>
                        <span>Temporarily deactivate your account</span>
                    </div>
                    <div class="setting-action">
                        <button class="btn btn-danger">Deactivate</button>
                    </div>
                </div>
            </section>

        </div>
    </main>
</body>
</html>
